services:
  mysql:
    image: mysql:8.0.42
    container_name: mysql
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # root 密码
      MYSQL_ROOT_PASSWORD: root
      # 初始化数据库(后续的初始化sql会在这个库执行)
      MYSQL_DATABASE: ry-vue
    ports:
      - "3306:3306"
    volumes:
      # 数据挂载
      - ./docker-data/mysql/data:/var/lib/mysql/
      # 配置挂载
      - ./docker-data/mysql/conf:/etc/mysql/conf.d/
      # 仅在 MySQL 数据目录为空时按文件名顺序初始化数据库
      - ../sql/ry_vue_5.X.sql:/docker-entrypoint-initdb.d/01-ry-vue.sql:ro
      - ../sql/ry_workflow.sql:/docker-entrypoint-initdb.d/02-ry-workflow.sql:ro
      - ../sql/ry_job.sql:/docker-entrypoint-initdb.d/03-ry-job.sql:ro
    command:
      # 将mysql8.0默认密码策略 修改为 原先 策略 (mysql8.0对其默认策略做了更改 会导致密码无法匹配)
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  nginx-web:
    image: nginx:1.23.4
    container_name: nginx-web
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      # 证书映射
      - ./docker-data/nginx/cert:/etc/nginx/cert
      # 配置文件映射
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # 页面目录 - 直接挂载前端构建产物目录
      - ../../../plus-ui/dist:/usr/share/nginx/html
      # 日志目录
      - ./docker-data/nginx/log:/var/log/nginx
    privileged: true
    depends_on:
      ruoyi-server1:
        condition: service_started
      ruoyi-server2:
        condition: service_started
      ruoyi-monitor-admin:
        condition: service_started
      ruoyi-snailjob-server:
        condition: service_started

  redis:
    image: redis:7.2.8
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    volumes:
      # 配置文件
      - ./redis/conf/redis.conf:/redis/config/redis.conf:ro
      # 数据文件
      - ./docker-data/redis/data:/redis/data:rw
    command: "redis-server /redis/config/redis.conf"
    privileged: true
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 'ruoyi123' ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  minio:
    # pgsty 开源社区 fork 重新维护的最新版 minio
    image: pgsty/minio:RELEASE.2026-02-14T12-00-00Z
    container_name: minio
    ports:
      # api 端口
      - "9000:9000"
      # 控制台端口
      - "9001:9001"
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      # 管理后台用户名
      MINIO_ROOT_USER: ruoyi
      # 管理后台密码，最小8个字符
      MINIO_ROOT_PASSWORD: ruoyi123
      # https需要指定域名
      #MINIO_SERVER_URL: "https://xxx.com:9000"
      #MINIO_BROWSER_REDIRECT_URL: "https://xxx.com:9001"
      # 开启压缩 on 开启 off 关闭
      MINIO_COMPRESS: "off"
      # 扩展名 .pdf,.doc 为空 所有类型均压缩
      MINIO_COMPRESS_EXTENSIONS: ""
      # mime 类型 application/pdf 为空 所有类型均压缩
      MINIO_COMPRESS_MIME_TYPES: ""
    volumes:
      # 映射当前目录下的data目录至容器内/data目录
      - ./docker-data/minio/data:/data
      # 映射配置目录
      - ./docker-data/minio/config:/root/.minio/
    command: server --address ':9000' --console-address ':9001' /data  # 指定容器中的目录 /data
    privileged: true
    healthcheck:
      # pgsty/minio 是精简镜像，不包含 curl/wget；其 /bin/sh 支持 TCP 探测。
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/9000"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  ruoyi-server1:
    image: ruoyi/ruoyi-server:5.6.2
    container_name: ruoyi-server1
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      SNAIL_PORT: 28080
    volumes:
      # 配置文件
      - ./docker-data/server1/logs:/ruoyi/server/logs/
      # skywalking 探针
#      - ./docker-data/skywalking/agent:/ruoyi/skywalking/agent
    ports:
      - "8080:8080"
    privileged: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ruoyi-monitor-admin:
        condition: service_started
      ruoyi-snailjob-server:
        condition: service_started

  ruoyi-server2:
    image: ruoyi/ruoyi-server:5.6.2
    container_name: ruoyi-server2
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SERVER_PORT: 8081
      SNAIL_PORT: 28081
    volumes:
      # 配置文件
      - ./docker-data/server2/logs:/ruoyi/server/logs/
      # skywalking 探针
#      - ./docker-data/skywalking/agent:/ruoyi/skywalking/agent
    ports:
      - "8081:8081"
    privileged: true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      ruoyi-monitor-admin:
        condition: service_started
      ruoyi-snailjob-server:
        condition: service_started

  ruoyi-monitor-admin:
    image: ruoyi/ruoyi-monitor-admin:5.6.2
    container_name: ruoyi-monitor-admin
    environment:
      # 时区上海
      TZ: Asia/Shanghai
      SPRING_BOOT_ADMIN_CLIENT_URL: http://ruoyi-monitor-admin:9090/admin
    volumes:
      # 配置文件
      - ./docker-data/monitor/logs:/ruoyi/monitor/logs
    ports:
      - "9090:9090"
    privileged: true

  ruoyi-snailjob-server:
    image: ruoyi/ruoyi-snailjob-server:5.6.2
    container_name: ruoyi-snailjob-server
    environment:
      # 时区上海
      TZ: Asia/Shanghai
    ports:
      - "8800:8800"
    volumes:
      - ./docker-data/snailjob/logs:/ruoyi/snailjob/logs
    privileged: true
    depends_on:
      mysql:
        condition: service_healthy
      ruoyi-monitor-admin:
        condition: service_started
